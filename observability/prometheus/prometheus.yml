global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8083

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - user-service:8080

  - job_name: ticket-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - ticket-service:8081

  - job_name: event-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - event-service:8082

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - payment-service:8084

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - notification-service:8085

  - job_name: importer-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - importer-service:8086
