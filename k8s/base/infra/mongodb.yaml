apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: notification-mongodb
  namespace: ems
spec:
  serviceName: notification-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: notification-mongodb
  template:
    metadata:
      labels:
        app: notification-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-mongodb
  namespace: ems
spec:
  selector:
    app: notification-mongodb
  ports:
    - port: 27017
      targetPort: 27017
---
